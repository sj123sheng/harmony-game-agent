<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>harmony-game-agent · 鸿蒙游戏开发工作台</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js" crossorigin="anonymous"></script>
<style>
  :root {
    --ink: #14121b;
    --surface: #1c1925;
    --surface-2: #252130;
    --surface-3: #2e2940;
    --line: #342e40;
    --line-soft: #2a2536;
    --text: #ece9f1;
    --muted: #a8a2b8;
    --muted-2: #6b6677;
    --accent: #7c5cff;
    --accent-2: #e649b5;
    --ok: #4ade80;
    --warn: #fbbf24;
    --err: #f87171;
    --grad: linear-gradient(135deg, var(--accent), var(--accent-2));
    --font-display: "Space Grotesk", system-ui, sans-serif;
    --font-sans: "IBM Plex Sans", -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    --font-mono: "IBM Plex Mono", "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--ink);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: "";
    position: fixed; inset: 0 0 auto 0; height: 320px;
    background: radial-gradient(ellipse 600px 240px at 30% -40%, rgba(124,92,255,.18), transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .app { display: flex; height: 100vh; position: relative; z-index: 1; }

  /* ───────── 左侧轨迹轨 ───────── */
  .rail {
    width: 288px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .rail-head {
    padding: 18px 20px 16px;
    border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 9px;
    background: var(--grad);
    display: grid; place-items: center;
    font-family: var(--font-mono); font-weight: 600; font-size: 13px; color: #fff;
    box-shadow: 0 6px 18px -6px rgba(124,92,255,.7);
  }
  .brand .name { font-family: var(--font-display); font-weight: 600; font-size: 15px; letter-spacing: -.01em; }
  .brand .name span { color: var(--muted); font-weight: 500; }
  .rail-meta {
    margin-top: 14px;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--muted-2); line-height: 1.7;
    text-transform: uppercase; letter-spacing: .08em;
  }
  .rail-meta b { color: var(--muted); font-weight: 500; }
  .rail-meta .dot-ok { color: var(--ok); }

  .rail-sessions { border-bottom: 1px solid var(--line); padding: 10px 12px; }
  .rail-sessions-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .rail-sessions-head .rs-label { font-family: var(--font-mono); font-size: 11px; color: var(--muted-2); text-transform: uppercase; letter-spacing: .08em; }
  .rs-new { background: transparent; border: 1px solid var(--line); color: var(--muted); border-radius: 6px; padding: 2px 9px; cursor: pointer; font-size: 14px; line-height: 1; transition: all .2s; }
  .rs-new:hover { color: var(--accent); border-color: var(--accent); }
  .rs-new:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .rail-sessions-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
  .rs-item { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 7px; cursor: pointer; border-left: 2px solid transparent; transition: all .2s; }
  .rs-item:hover { background: var(--surface); }
  .rs-item.active { background: var(--surface); border-left-color: var(--accent); }
  .rs-item .rs-title { flex: 1; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rs-item.active .rs-title { color: var(--text); }
  .rs-item .rs-del { opacity: 0; background: none; border: none; color: var(--muted-2); cursor: pointer; font-size: 13px; padding: 0 2px; }
  .rs-item:hover .rs-del, .rs-item:focus-within .rs-del { opacity: 1; }
  .rs-item .rs-del:hover { color: var(--err); }
  .rs-empty { font-size: 11px; color: var(--muted-2); padding: 4px 8px; }

  .rail-body {
    flex: 1; overflow-y: auto;
    padding: 16px 0 24px;
  }
  .rail-empty {
    padding: 24px 20px;
    font-size: 12.5px; color: var(--muted-2); line-height: 1.6;
    font-family: var(--font-mono);
  }
  .trace-group { padding: 0 20px; margin-bottom: 18px; }
  .trace-head {
    display: flex; flex-direction: column; gap: 3px;
    margin-bottom: 10px;
  }
  .trace-no {
    font-family: var(--font-mono); font-size: 10.5px;
    color: var(--accent); font-weight: 500;
    text-transform: uppercase; letter-spacing: .14em;
  }
  .trace-prompt { font-size: 12.5px; color: var(--muted); line-height: 1.45; word-break: break-word; }

  .spine { position: relative; padding-left: 14px; }
  .spine::before {
    content: ""; position: absolute; left: 4px; top: 6px; bottom: 6px;
    width: 1px; background: var(--line);
  }
  .t-node {
    position: relative; padding: 5px 0 5px 14px;
    font-family: var(--font-mono); font-size: 12px;
    color: var(--muted); display: flex; align-items: center; gap: 8px;
    animation: nodein .35s ease both;
  }
  .t-node .t-dot {
    position: absolute; left: -2px; top: 9px;
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--surface); border: 1.5px solid var(--muted-2);
    transition: all .25s;
  }
  .t-node.pending .t-dot { border-color: var(--warn); background: var(--warn); animation: pulse 1.1s ease-in-out infinite; }
  .t-node.pending { color: var(--text); }
  .t-node.ok .t-dot { border-color: var(--ok); background: var(--ok); box-shadow: 0 0 10px -1px rgba(74,222,128,.6); }
  .t-node.ok { color: var(--text); }
  .t-node.err .t-dot { border-color: var(--err); background: var(--err); }
  .t-node.err { color: var(--err); }
  .t-node .t-tag { font-size: 10px; color: var(--muted-2); margin-left: auto; text-transform: uppercase; letter-spacing: .08em; }
  .t-node.is-clickable {
    cursor: pointer; border-radius: 7px; margin-left: -6px; padding-left: 20px;
    transition: background .18s, color .18s;
  }
  .t-node.is-clickable:hover,
  .t-node.is-clickable:focus-visible {
    background: rgba(124,92,255,.1); color: var(--text); outline: none;
  }
  .tool.tool-running { border-left: 2px solid var(--warn); }
  .tool.tool-ok { border-left: 2px solid var(--ok); }
  .tool.tool-err { border-left: 2px solid var(--err); }
  .tool-status {
    margin-left: auto; color: var(--muted-2); font-size: 10px;
    text-transform: uppercase; letter-spacing: .08em;
  }
  .target-flash {
    animation: targetFlash 1.4s ease-out both;
  }
  @keyframes targetFlash {
    0% { box-shadow: 0 0 0 0 rgba(124,92,255,.75); border-color: var(--accent); }
    100% { box-shadow: 0 0 0 12px rgba(124,92,255,0); }
  }
  @keyframes nodein { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: none; } }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.35); opacity: .55; } }

  /* ───────── 主对话区 ───────── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    height: 62px; flex-shrink: 0;
    padding: 0 24px;
    border-bottom: 1px solid var(--line);
    background: rgba(28,25,37,.6);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .topbar .title { font-family: var(--font-display); font-weight: 500; font-size: 15px; }
  .topbar .title .sub { color: var(--muted); font-weight: 400; margin-left: 8px; font-size: 13px; }
  .topbar .actions { display: flex; gap: 8px; }
  .icon-btn {
    background: transparent; border: 1px solid var(--line);
    color: var(--muted); border-radius: 8px; padding: 6px 12px;
    font-family: var(--font-sans); font-size: 12.5px; cursor: pointer;
    transition: all .2s;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent); }

  .export-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent; border: 1px solid var(--accent);
    color: var(--accent); border-radius: 8px; padding: 6px 13px;
    font-family: var(--font-sans); font-size: 12.5px; font-weight: 500;
    text-decoration: none; cursor: pointer; transition: all .2s;
  }
  .export-btn:hover {
    background: var(--grad); border-color: transparent; color: #fff;
    box-shadow: 0 6px 18px -8px rgba(124,92,255,.7);
  }
  .export-btn .glyph { font-size: 14px; line-height: 1; }

  .tool.file-card { border-left: 2px solid var(--accent); }
  .file-actions { display: flex; gap: 8px; margin: 8px 0 4px; }
  .file-export-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: transparent; border: 1px solid var(--line);
    color: var(--muted); border-radius: 7px; padding: 5px 11px;
    font-family: var(--font-mono); font-size: 11px;
    text-decoration: none; cursor: pointer; transition: all .2s;
  }
  .file-export-btn:hover { color: var(--accent); border-color: var(--accent); }
  .file-export-btn .glyph { font-size: 12px; line-height: 1; }

  .thread {
    flex: 1; overflow-y: auto;
    padding: 28px 24px 12px;
  }
  .thread-inner {
    max-width: 780px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 18px;
  }
  .empty-state {
    margin: auto; text-align: center; padding: 60px 20px;
    color: var(--muted); max-width: 460px;
  }
  .empty-state .glyph {
    width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 18px;
    background: var(--grad); display: grid; place-items: center;
    font-family: var(--font-display); font-weight: 700; color: #fff; font-size: 24px;
    box-shadow: 0 12px 30px -10px rgba(124,92,255,.7);
  }
  .empty-state h2 { font-family: var(--font-display); font-weight: 600; font-size: 20px; margin: 0 0 8px; color: var(--text); }
  .empty-state p { font-size: 14px; line-height: 1.6; margin: 0 0 18px; }
  .empty-state .hints { display: flex; flex-direction: column; gap: 8px; }
  .empty-state .hint {
    text-align: left; background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--muted);
    cursor: pointer; transition: all .2s;
  }
  .empty-state .hint:hover { border-color: var(--accent); color: var(--text); }
  .empty-state .hint code { font-family: var(--font-mono); color: var(--accent); }

  /* 消息 */
  .msg { display: flex; max-width: 100%; }
  .msg.user { justify-content: flex-end; }
  .msg .bubble {
    max-width: 86%; padding: 11px 15px; border-radius: 14px;
    line-height: 1.65; font-size: 14.5px; word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--surface-2); border: 1px solid var(--line);
    border-bottom-right-radius: 5px; color: var(--text);
  }
  .msg.bot .bubble {
    background: transparent; border: 1px solid var(--line);
    border-bottom-left-radius: 5px; border-top-left: 2px solid var(--accent);
  }
  .bubble p:first-child { margin-top: 0; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { margin: 6px 0; padding-left: 22px; }
  .bubble li { margin: 3px 0; }
  .bubble a { color: var(--accent); }
  .bubble code { font-family: var(--font-mono); font-size: 12.5px; }
  .bubble :not(pre) > code { background: var(--surface-2); padding: 1px 6px; border-radius: 5px; color: #e6d6ff; }
  .bubble pre {
    position: relative; background: #0f0d16 !important;
    border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; overflow-x: auto; margin: 10px 0;
  }
  .bubble pre code { background: transparent; padding: 0; font-size: 12.5px; line-height: 1.55; }
  .copy-btn {
    position: absolute; top: 8px; right: 8px;
    background: var(--surface-2); border: 1px solid var(--line);
    color: var(--muted); border-radius: 6px; padding: 3px 9px;
    font-family: var(--font-mono); font-size: 10.5px; cursor: pointer;
    opacity: 0; transition: all .2s;
  }
  .bubble pre:hover .copy-btn { opacity: 1; }

  /* 工具卡片（紧凑可折叠） */
  .tool {
    align-self: flex-start; max-width: 86%;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 11px; overflow: hidden;
  }
  .tool-head {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 13px; cursor: pointer; user-select: none;
    font-family: var(--font-mono); font-size: 12.5px;
    transition: background .2s;
  }
  .tool-head:hover { background: var(--surface-2); }
  .tool-head .t-glyph { color: var(--warn); font-size: 13px; }
  .tool-head .t-name { color: var(--text); font-weight: 500; }
  .tool-head .t-chev { margin-left: auto; color: var(--muted-2); font-size: 10px; transition: transform .2s; }
  .tool.open .t-chev { transform: rotate(90deg); }
  .tool-body {
    display: none; padding: 0 13px 11px;
    border-top: 1px solid var(--line-soft);
  }
  .tool.open .tool-body { display: block; }
  .tool-body pre {
    margin: 8px 0 0; padding: 10px 12px;
    background: #0f0d16; border-radius: 8px;
    font-family: var(--font-mono); font-size: 12px; color: #d6cde6;
    overflow-x: auto; white-space: pre-wrap; word-break: break-word;
    max-height: 320px; overflow-y: auto;
  }

  /* 工具结果 */
  .result {
    align-self: flex-start; max-width: 86%;
    background: var(--surface); border: 1px solid var(--line);
    border-left: 2px solid var(--ok); border-radius: 11px; overflow: hidden;
  }
  .result.err { border-left-color: var(--err); }
  .result-head {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 13px; cursor: pointer; user-select: none;
    font-family: var(--font-mono); font-size: 12px; color: var(--muted);
  }
  .result-head:hover { color: var(--text); }
  .result.err .result-head { color: var(--err); }
  .result-head .r-chev { margin-left: auto; font-size: 10px; color: var(--muted-2); transition: transform .2s; }
  .result.open .r-chev { transform: rotate(90deg); }
  .result-body {
    display: none; padding: 0 13px 11px; border-top: 1px solid var(--line-soft);
    font-family: var(--font-mono); font-size: 12px; color: #c8c0d6;
    white-space: pre-wrap; word-break: break-word; line-height: 1.55;
    max-height: 360px; overflow-y: auto;
  }
  .result.open .result-body { display: block; }

  .error-bar {
    align-self: center; max-width: 92%;
    background: rgba(248,113,113,.08); color: var(--err);
    border: 1px solid rgba(248,113,113,.3); border-radius: 10px;
    padding: 9px 14px; font-size: 13px; line-height: 1.5;
  }

  .typing { display: flex; gap: 4px; padding: 4px 2px; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s ease-in-out infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity: .25; } 40% { opacity: 1; } }

  /* 输入栏 */
  .composer {
    flex-shrink: 0; padding: 14px 24px 20px;
    border-top: 1px solid var(--line);
    background: linear-gradient(to top, var(--ink) 60%, transparent);
  }
  .composer-inner { max-width: 780px; margin: 0 auto; }
  .composer-box {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 8px 8px 8px 14px;
    transition: border-color .2s, box-shadow .2s;
  }
  .composer-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,255,.15); }
  #input {
    flex: 1; resize: none; border: none; background: transparent;
    color: var(--text); font-family: var(--font-sans); font-size: 14.5px;
    line-height: 1.55; max-height: 160px; outline: none; padding: 6px 0;
  }
  #input::placeholder { color: var(--muted-2); }
  #send {
    background: var(--grad); color: #fff; border: none;
    border-radius: 10px; padding: 9px 18px;
    font-family: var(--font-sans); font-weight: 600; font-size: 13.5px;
    cursor: pointer; transition: transform .15s, opacity .2s;
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  #send:hover:not(:disabled) { transform: translateY(-1px); }
  #send:disabled { opacity: .4; cursor: not-allowed; }
  #send .kbd { font-family: var(--font-mono); font-size: 10px; opacity: .7; font-weight: 500; }
  .composer-hint {
    margin: 8px 2px 0; font-family: var(--font-mono); font-size: 10.5px;
    color: var(--muted-2); text-transform: uppercase; letter-spacing: .06em;
  }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }

  /* 响应式：移动端轨迹轨折叠为顶部横条 */
  @media (max-width: 860px) {
    .app { flex-direction: column; }
    .rail { width: 100%; max-height: 132px; border-right: none; border-bottom: 1px solid var(--line); }
    .rail-head { padding: 12px 16px 10px; }
    .rail-meta { display: none; }
    .rail-body { padding: 8px 0 12px; display: flex; gap: 14px; overflow-x: auto; }
    .trace-group { padding: 0 14px; margin-bottom: 0; flex-shrink: 0; min-width: 200px; }
    .topbar { padding: 0 16px; height: 54px; }
    .topbar .title .sub { display: none; }
    .thread { padding: 18px 14px 8px; }
    .composer { padding: 10px 14px 16px; }
    .empty-state { padding: 40px 16px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
    .target-flash { box-shadow: 0 0 0 2px var(--accent); }
  }
</style>
</head>
<body>
<div class="app">

  <aside class="rail">
    <div class="rail-head">
      <div class="brand">
        <div class="mark">hga</div>
        <div class="name">harmony<span>-game-agent</span></div>
      </div>
      <div class="rail-meta">
        状态 <span class="dot-ok">● 在线</span><br>
        能力 <b>生成 · 审查 · 落盘</b><br>
        输出 <b>./generated/</b>
      </div>
    </div>
    <div class="rail-sessions">
      <div class="rail-sessions-head">
        <span class="rs-label">会话</span>
        <button class="rs-new" id="newSessionBtn" title="新会话">＋</button>
      </div>
      <div class="rail-sessions-list" id="sessionsList"></div>
    </div>
    <div class="rail-body" id="rail">
      <div class="rail-empty" id="railEmpty">轨迹轨：每个回合的工具调用链会按顺序点亮在这里。</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="title">工作台<span class="sub">鸿蒙原生游戏开发助手</span></div>
      <div class="actions">
        <a class="export-btn" href="/export?path=." download title="打包下载整个 generated/ 目录"><span class="glyph">⬇</span>导出全部</a>
        <button class="icon-btn" id="clearBtn">清空</button>
      </div>
    </div>

    <div class="thread" id="thread">
      <div class="thread-inner" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="glyph">胡</div>
          <h2>说一句话，开始你的鸿蒙组件</h2>
          <p>我会调用工具生成 ArkTS 骨架、审查代码，并把成品写入 ./generated/。下面是几个起点：</p>
          <div class="hints">
            <div class="hint" data-prompt="生成一个战士角色属性系统，等级上限 60，并审查它">生成角色属性系统 <code>character_stats</code></div>
            <div class="hint" data-prompt="脚手架一个叫 rpgdemo 的 DevEco 工程，把已生成的子系统组装进去">脚手架 DevEco 工程 <code>rpgdemo</code></div>
            <div class="hint" data-prompt="分析这段运行日志的报错：[示例日志] CharacterStats.ets:42 TypeError">分析运行日志报错</div>
            <div class="hint" data-prompt="审查这段 ArkTS 代码：@Component struct HealthBar { build() { Text('HP').fontSize(20) } }">审查 ArkTS 代码</div>
          </div>
        </div>
      </div>
    </div>

    <div class="composer">
      <div class="composer-inner">
        <div class="composer-box">
          <textarea id="input" rows="1" placeholder="描述你的需求，例如：生成一个带受击动画的玩家血条入口组件"></textarea>
          <button id="send" type="submit">发送 <span class="kbd">↵</span></button>
        </div>
        <div class="composer-hint">Enter 发送 · Shift+Enter 换行 · 工具调用会实时出现在左侧轨迹</div>
      </div>
    </div>
  </main>
</div>

<script>
const messagesEl = document.getElementById('messages');
const threadEl = document.getElementById('thread');
const railEl = document.getElementById('rail');
let railEmpty = document.getElementById('railEmpty');
const emptyState = document.getElementById('emptyState');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const clearBtn = document.getElementById('clearBtn');

marked.setOptions({ breaks: true, gfm: true });

let busy = false;
let currentBot = null;
let turnNo = 0;
let currentGroup = null;
let pendingNode = null;
let textOpen = false;
let currentSessionId = null;
let currentAbort = null; // 当前 SSE 请求的 AbortController，用于删除/切换/新建会话时取消进行中流
let toolSeq = 0;
let cardSeq = 0;
let activeTool = null;
const toolTargets = new Map();
const sessionsListEl = document.getElementById('sessionsList');
const newSessionBtn = document.getElementById('newSessionBtn');

const TOOL_LABELS = {
  'mcp__harmony_tools__generate_character_stats': '生成角色属性',
  'mcp__harmony_tools__generate_skill_system': '生成技能系统',
  'mcp__harmony_tools__generate_inventory': '生成背包',
  'mcp__harmony_tools__generate_enemy_ai': '生成敌人 AI',
  'mcp__harmony_tools__scaffold_deveco_project': '脚手架工程',
  'mcp__harmony_tools__review_arkts_code': '代码审查',
  'mcp__harmony_tools__analyze_runtime_logs': '日志分析',
  'mcp__harmony_tools__suggest_performance_fixes': '性能建议',
  'mcp__harmony_tools__locate_bug': 'Bug 定位',
  'mcp__harmony_tools__check_api_usage': 'API 审查',
  'Bash': '执行命令',
  'Read': '读取文件',
  'Write': '写入文件',
  'Edit': '编辑文件',
  'Glob': '查找文件',
  'Grep': '搜索内容',
  'LS': '列目录',
};
function shortToolName(full) {
  if (TOOL_LABELS[full]) return TOOL_LABELS[full];
  const tail = full.split('__').pop();
  return tail.charAt(0).toUpperCase() + tail.slice(1);
}

function scrollThread() { threadEl.scrollTop = threadEl.scrollHeight; }
function scrollRail() { railEl.scrollTop = railEl.scrollHeight; railEl.scrollLeft = railEl.scrollWidth; }

function prefersReducedMotion() {
  return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
}

function ensureCardId(card, prefix) {
  if (!card.id) {
    cardSeq += 1;
    card.id = prefix + '-' + String(cardSeq);
  }
  return card.id;
}

function focusCard(cardId) {
  const el = document.getElementById(cardId);
  if (!el) return;
  el.scrollIntoView({ behavior: prefersReducedMotion() ? 'auto' : 'smooth', block: 'start' });
  el.classList.remove('target-flash');
  void el.offsetWidth;
  el.classList.add('target-flash');
  if (!prefersReducedMotion()) setTimeout(() => el.classList.remove('target-flash'), 1400);
}

function clearToolState() {
  toolSeq = 0;
  activeTool = null;
  toolTargets.clear();
}

// ── 会话列表 ──
async function loadSessions() {
  try {
    const resp = await fetch('/sessions');
    if (!resp.ok) return;
    const items = await resp.json();
    renderSessionsList(items);
  } catch (e) { /* 静默 */ }
}

function renderSessionsList(items) {
  sessionsListEl.innerHTML = '';
  if (!items.length) {
    sessionsListEl.innerHTML = '<div class="rs-empty">尚无会话</div>';
    return;
  }
  for (const it of items) {
    const div = document.createElement('div');
    div.className = 'rs-item' + (it.id === currentSessionId ? ' active' : '');
    const title = document.createElement('span');
    title.className = 'rs-title';
    title.textContent = it.title || '(无标题)';
    title.title = it.title || '';
    const del = document.createElement('button');
    del.className = 'rs-del';
    del.textContent = '✕';
    del.title = '删除会话';
    del.setAttribute('aria-label', '删除会话');
    del.addEventListener('click', (e) => { e.stopPropagation(); deleteSession(it.id); });
    div.appendChild(title);
    div.appendChild(del);
    div.addEventListener('click', () => switchSession(it.id));
    sessionsListEl.appendChild(div);
  }
}

async function deleteSession(sid) {
  // 取消进行中 SSE 流，防止删除后幽灵卡片继续渲染
  if (currentAbort) { currentAbort.abort(); currentAbort = null; }
  if (!confirm('删除该会话？历史卡片将无法回看。')) return;
  busy = true; // 防止删除期间用户穿插发送消息
  try {
    const resp = await fetch(`/sessions/${sid}`, { method: 'DELETE' });
    if (!resp.ok) { addErrorBar('删除会话失败（HTTP ' + resp.status + '）'); return; }
    if (sid === currentSessionId) {
      clearAll();
      currentSessionId = null;
    }
    loadSessions();
  } catch (e) {
    addErrorBar('删除会话失败：' + String(e));
  } finally {
    busy = false;
  }
}

function clearAll() {
  messagesEl.innerHTML = '';
  railEl.innerHTML = '<div class="rail-empty" id="railEmpty">轨迹轨：每个回合的工具调用链会按顺序点亮在这里。</div>';
  // 重建 DOM 后更新全局引用，否则 railEmpty 仍指向被移除的旧节点
  railEmpty = document.getElementById('railEmpty');
  turnNo = 0; currentGroup = null; pendingNode = null; currentBot = null; textOpen = false;
  clearToolState();
}

function newSession() {
  if (busy) return;
  // 取消进行中 SSE 流，防止新建后幽灵卡片继续渲染
  if (currentAbort) { currentAbort.abort(); currentAbort = null; }
  clearAll();
  currentSessionId = null;
  inputEl.focus();
  loadSessions();
}

async function switchSession(sid) {
  if (busy) return;
  if (sid === currentSessionId) return;
  // 取消进行中 SSE 流，防止切换后幽灵卡片继续渲染
  if (currentAbort) { currentAbort.abort(); currentAbort = null; }
  busy = true; // 防止 fetch 返回前用户穿插发送消息
  clearAll();
  try {
    const resp = await fetch(`/sessions/${sid}/events`);
    if (!resp.ok) { addErrorBar('加载会话失败'); return; }
    const data = await resp.json();
    currentSessionId = sid;
    replayEvents(data.events || []);
    loadSessions();
  } catch (e) {
    addErrorBar(String(e));
  } finally {
    busy = false;
  }
}

function replayEvents(events) {
  // 回放按回合分段：session_started 设 id 不渲染；done/error → finalizeBot 结束当前回合；
  // 其余事件（text/tool_use/file/findings/tool_result）→ 若当前无活跃回合则先 startTurn('历史回放')。
  // 这样多轮回放显示多个独立 bot 气泡，不会把下一轮 text 拼到上一轮 bubble。
  for (const { event, data } of events) {
    if (event === 'session_started') {
      currentSessionId = data.session_id;
      continue;
    }
    if (event === 'done' || event === 'error') {
      // 结束当前回合：不渲染 done 卡片，但关闭 bot bubble + 清 currentGroup 防止下一轮 text 拼接
      finalizeBot();
      currentGroup = null;
      continue;
    }
    // 其余事件：若无活跃回合（首轮或上一轮已 finalize），先开新回合
    if (currentGroup === null) {
      hideEmpty();
      startTurn('历史回放');
    }
    try {
      handleEvent(event, data);
    } catch (e) {
      console.warn('回放事件渲染失败，跳过：', event, e);
    }
  }
  // 末尾若仍有活跃回合，收尾
  if (currentGroup !== null) finalizeBot();
  scrollThread();
  scrollRail();
}

function hideEmpty() { if (emptyState && emptyState.parentNode) emptyState.remove(); }

function addUser(text) {
  hideEmpty();
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="bubble"></div>';
  div.querySelector('.bubble').textContent = text;
  messagesEl.appendChild(div);
  scrollThread();
}

function newBotBubble() {
  hideEmpty();
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="bubble"></div>';
  messagesEl.appendChild(div);
  currentBot = div.querySelector('.bubble');
  scrollThread();
  return currentBot;
}

function renderMarkdown(el, text) {
  // DOMPurify 消毒防止存储型 XSS：Agent 恶意输出（如 <img onerror>）在回放时执行
  el.innerHTML = DOMPurify.sanitize(marked.parse(text), { USE_PROFILES: { html: true } });
  el.querySelectorAll('pre code').forEach(b => { try { hljs.highlightElement(b); } catch(e){} });
  el.querySelectorAll('pre').forEach(pre => {
    if (pre.dataset.enh) return;
    pre.dataset.enh = '1';
    const code = pre.querySelector('code');
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '复制';
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(code ? code.textContent : pre.textContent);
      btn.textContent = '已复制';
      setTimeout(() => btn.textContent = '复制', 1400);
    });
    pre.appendChild(btn);
  });
}

function appendText(text) {
  if (!currentBot) {
    newBotBubble();
    if (currentGroup && !textOpen) { traceNode('回复', 'ok'); textOpen = true; }
  }
  currentBot.dataset.buf = (currentBot.dataset.buf || '') + text;
  renderMarkdown(currentBot, currentBot.dataset.buf);
  scrollThread();
}

function addTyping() {
  if (currentBot) return;
  hideEmpty();
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  messagesEl.appendChild(div);
  scrollThread();
}
function removeTyping() {
  const t = messagesEl.querySelector('.typing');
  if (t) { t.closest('.msg').remove(); }
}

function finalizeBot() { currentBot = null; textOpen = false; }

function addToolCard(name, input, meta = {}) {
  finalizeBot();
  const div = document.createElement('div');
  div.className = 'tool tool-running open';
  const head = document.createElement('div');
  head.className = 'tool-head';
  head.innerHTML = '<span class="t-glyph">▣</span><span class="t-name"></span><span class="tool-status"></span><span class="t-chev">▶</span>';
  head.querySelector('.t-name').textContent = '调用 · ' + shortToolName(name);
  head.querySelector('.tool-status').textContent = meta.status || '运行中';
  const body = document.createElement('div');
  body.className = 'tool-body';
  const pre = document.createElement('pre');
  pre.textContent = JSON.stringify(input, null, 2);
  body.appendChild(pre);
  head.addEventListener('click', () => div.classList.toggle('open'));
  div.appendChild(head); div.appendChild(body);
  messagesEl.appendChild(div);
  scrollThread();
  return div;
}

function addResultCard(text, isError) {
  finalizeBot();
  const div = document.createElement('div');
  div.className = 'result' + (isError ? ' err' : '');
  const head = document.createElement('div');
  head.className = 'result-head';
  head.innerHTML = (isError ? '<span>✕</span>' : '<span>✓</span>') + '<span class="r-label"></span><span class="r-chev">▶</span>';
  head.querySelector('.r-label').textContent = isError ? '工具结果 · 错误 · 点击展开' : '工具结果 · 点击展开';
  const body = document.createElement('div');
  body.className = 'result-body';
  body.textContent = text;
  head.addEventListener('click', () => div.classList.toggle('open'));
  div.appendChild(head); div.appendChild(body);
  messagesEl.appendChild(div);
  scrollThread();
  return div;
}

function addFileCard(path, content, isError) {
  finalizeBot();
  const div = document.createElement('div');
  div.className = 'tool file-card' + (isError ? ' open' : '');
  const head = document.createElement('div');
  head.className = 'tool-head';
  head.innerHTML = '<span class="t-glyph">▶</span><span class="t-name"></span><span class="t-chev">▶</span>';
  head.querySelector('.t-name').textContent = (isError ? '✕ ' : '📄 ') + path;
  const body = document.createElement('div');
  body.className = 'tool-body';
  if (isError) {
    const p = document.createElement('pre');
    p.textContent = '写入失败';
    body.appendChild(p);
  } else {
    const dir = path.includes('/') ? path.slice(0, path.lastIndexOf('/')) : '';
    const exportDir = dir || '.';
    const actions = document.createElement('div');
    actions.className = 'file-actions';
    actions.innerHTML =
      `<a class="file-export-btn" href="/export?path=${encodeURIComponent(path)}" download><span class="glyph">⬇</span>导出该文件</a>` +
      `<a class="file-export-btn" href="/export?path=${encodeURIComponent(exportDir)}" download><span class="glyph">⬇</span>导出整目录</a>`;
    body.appendChild(actions);
    const pre = document.createElement('pre');
    const code = document.createElement('code');
    code.className = 'language-typescript';
    code.textContent = content || '';
    pre.appendChild(code);
    try { hljs.highlightElement(code); } catch(e) {}
    body.appendChild(pre);
  }
  head.addEventListener('click', () => div.classList.toggle('open'));
  div.appendChild(head); div.appendChild(body);
  // 首个 file 卡片默认展开
  if (!messagesEl.querySelector('.file-card-default')) {
    div.classList.add('open');
    div.classList.add('file-card-default');
  }
  messagesEl.appendChild(div);
  scrollThread();
  return div;
}

function severityRank(s) {
  return {'高':0,'中':1,'低':2}[String(s)] ?? 3;
}

function addFindingsCards(findings, isError) {
  finalizeBot();
  if (!findings.length) {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="bubble"><p${isError ? ' style="color:var(--err)"' : ''}>${isError ? '⚠ 分析工具返回错误状态（无结果）' : '✓ 无发现'}</p></div>`;
    messagesEl.appendChild(div);
    scrollThread();
    return div;
  }
  if (isError) {
    const warn = document.createElement('div');
    warn.className = 'msg bot';
    warn.innerHTML = '<div class="bubble"><p>⚠ 分析工具返回错误状态（以下为部分结果）</p></div>';
    messagesEl.appendChild(warn);
  }
  const sorted = [...findings].sort((a,b) => severityRank(a.severity) - severityRank(b.severity));
  let firstCard = null;
  for (const f of sorted) {
    const div = document.createElement('div');
    if (!firstCard) firstCard = div;
    div.className = 'tool open';
    const sev = String(f.severity || '?');
    const sevColor = {'高':'var(--err)','中':'var(--warn)','低':'#60a5fa'}[sev] || 'var(--muted-2)';
    const head = document.createElement('div');
    head.className = 'tool-head';
    head.innerHTML = `<span class="t-glyph" style="color:${sevColor}">●</span><span class="t-name"></span><span class="t-chev">▶</span>`;
    head.querySelector('.t-name').textContent = `[${sev}] ${f.location || '?'}`;
    const body = document.createElement('div');
    body.className = 'tool-body';
    const addRow = (label, val) => {
      if (!val) return;
      const p = document.createElement('div');
      p.style.cssText = 'margin:4px 0;font-size:12.5px;';
      const b = document.createElement('b');
      b.style.color = 'var(--muted)';
      b.textContent = label + ':';
      p.appendChild(b);
      p.appendChild(document.createTextNode(' ' + String(val)));
      body.appendChild(p);
    };
    addRow('问题', f.summary);
    addRow('建议', f.fix);
    for (const [k, v] of Object.entries(f)) {
      if (['severity','location','summary','fix'].includes(k)) continue;
      addRow(k, v);
    }
    head.addEventListener('click', () => div.classList.toggle('open'));
    div.appendChild(head); div.appendChild(body);
    messagesEl.appendChild(div);
  }
  scrollThread();
  return firstCard;
}

function addErrorBar(msg) {
  finalizeBot();
  const div = document.createElement('div');
  div.className = 'error-bar';
  div.textContent = '错误：' + msg;
  messagesEl.appendChild(div);
  scrollThread();
}

/* ── 轨迹轨 ── */
function startTurn(prompt) {
  if (railEmpty) railEmpty.remove();
  turnNo += 1;
  currentGroup = document.createElement('div');
  currentGroup.className = 'trace-group';
  const head = document.createElement('div');
  head.className = 'trace-head';
  head.innerHTML = '<div class="trace-no"></div><div class="trace-prompt"></div>';
  head.querySelector('.trace-no').textContent = '回合 ' + String(turnNo).padStart(2, '0');
  head.querySelector('.trace-prompt').textContent = prompt.length > 48 ? prompt.slice(0, 48) + '…' : prompt;
  const spine = document.createElement('div');
  spine.className = 'spine';
  currentGroup.appendChild(head);
  currentGroup.appendChild(spine);
  railEl.appendChild(currentGroup);
  scrollRail();
  pendingNode = null;
  textOpen = false;
}

function bindTraceNode(node, cardId) {
  node.dataset.targetId = cardId;
  node.classList.add('is-clickable');
  node.setAttribute('role', 'button');
  node.setAttribute('tabindex', '0');
  node.setAttribute('aria-label', '定位到右侧详情');
  if (node.dataset.bound === '1') return;
  node.dataset.bound = '1';
  node.addEventListener('click', () => focusCard(node.dataset.targetId));
  node.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      focusCard(node.dataset.targetId);
    }
  });
}

function traceNode(label, status, tag, targetId) {
  if (!currentGroup) return null;
  const spine = currentGroup.querySelector('.spine');
  const node = document.createElement('div');
  node.className = 't-node ' + status;
  node.innerHTML = '<span class="t-dot"></span><span class="t-label"></span>' + (tag ? '<span class="t-tag"></span>' : '');
  node.querySelector('.t-label').textContent = label;
  if (tag) node.querySelector('.t-tag').textContent = tag;
  if (targetId) bindTraceNode(node, targetId);
  spine.appendChild(node);
  scrollRail();
  return node;
}

function linkTraceToCard(phase, card, preferDetail = true) {
  if (!phase || !card) return;
  const cardId = ensureCardId(card, phase.id + '-card');
  const target = toolTargets.get(phase.id);
  if (target) {
    if (!target.primaryCard || preferDetail) target.primaryCard = card;
    target.detailCards.push(card);
  }
  phase.primaryTargetId = cardId;
  bindTraceNode(phase.node, cardId);
}

function setToolPhaseStatus(phase, status, tag) {
  if (!phase) return;
  phase.status = status;
  phase.toolCard.classList.remove('tool-running', 'tool-ok', 'tool-err');
  phase.toolCard.classList.add(status === 'err' ? 'tool-err' : status === 'ok' ? 'tool-ok' : 'tool-running');
  const statusEl = phase.toolCard.querySelector('.tool-status');
  if (statusEl) statusEl.textContent = tag;
  phase.node.className = 't-node ' + status + (phase.node.dataset.targetId ? ' is-clickable' : '');
  const tagEl = phase.node.querySelector('.t-tag');
  if (tagEl) tagEl.textContent = tag;
}

function createToolPhase(name, input) {
  if (!currentGroup) return null;
  toolSeq += 1;
  const id = 'tool-' + String(toolSeq);
  const toolCard = addToolCard(name, input, { status: '运行中' });
  const cardId = ensureCardId(toolCard, id + '-card');
  const node = traceNode(shortToolName(name), 'pending', '运行中', cardId);
  const phase = { id, node, toolCard, primaryTargetId: cardId, status: 'pending' };
  toolTargets.set(id, { node, primaryCard: toolCard, detailCards: [] });
  activeTool = phase;
  return phase;
}

function parseSSE(raw) {
  let event = 'message', data = '';
  for (const line of raw.split('\n')) {
    if (line.startsWith('event:')) event = line.slice(6).trim();
    else if (line.startsWith('data:')) data += line.slice(5).trim();
  }
  let obj = {};
  try { obj = JSON.parse(data || '{}'); } catch(e) { obj = { raw: data }; }
  return { event, data: obj };
}

function handleEvent(event, data) {
  switch (event) {
    case 'session_started':
      currentSessionId = data.session_id;
      loadSessions();
      break;
    case 'text':
      removeTyping();
      appendText(data.text || '');
      break;
    case 'tool_use':
      finalizeBot();
      activeTool = createToolPhase(data.name, data.input);
      pendingNode = activeTool ? activeTool.node : null;
      break;
    case 'file': {
      finalizeBot();
      const card = addFileCard(data.path, data.content, data.is_error);
      if (activeTool) {
        setToolPhaseStatus(activeTool, data.is_error ? 'err' : 'ok', data.is_error ? '失败' : '文件');
        linkTraceToCard(activeTool, card, true);
      } else if (pendingNode) {
        pendingNode.className = 't-node ' + (data.is_error ? 'err' : 'ok');
        const tag = pendingNode.querySelector('.t-tag');
        if (tag) tag.textContent = data.is_error ? '失败' : '文件';
      }
      break;
    }
    case 'findings': {
      finalizeBot();
      const findings = data.findings || [];
      const card = addFindingsCards(findings, data.is_error);
      if (activeTool) {
        setToolPhaseStatus(activeTool, data.is_error ? 'err' : 'ok', data.is_error ? '失败' : `${findings.length} 条`);
        linkTraceToCard(activeTool, card, true);
        activeTool = null;
        pendingNode = null;
      } else if (pendingNode) {
        pendingNode.className = 't-node ' + (data.is_error ? 'err' : 'ok');
        const tag = pendingNode.querySelector('.t-tag');
        if (tag) tag.textContent = `${findings.length} 条`;
        pendingNode = null;
      }
      break;
    }
    case 'tool_result': {
      finalizeBot();
      const card = addResultCard(data.text || '', data.is_error);
      if (activeTool) {
        setToolPhaseStatus(activeTool, data.is_error ? 'err' : 'ok', data.is_error ? '失败' : '完成');
        const target = toolTargets.get(activeTool.id);
        linkTraceToCard(activeTool, card, !(target && target.detailCards.length));
        activeTool = null;
        pendingNode = null;
      } else if (pendingNode) {
        pendingNode.className = 't-node ' + (data.is_error ? 'err' : 'ok');
        const tag = pendingNode.querySelector('.t-tag');
        if (tag) tag.textContent = data.is_error ? '失败' : '完成';
        pendingNode = null;
      }
      break;
    }
    case 'done':
      finalizeBot();
      if (activeTool) {
        setToolPhaseStatus(activeTool, 'ok', '完成');
        activeTool = null;
      }
      if (pendingNode) { pendingNode.className = 't-node ok'; pendingNode = null; }
      break;
    case 'error':
      finalizeBot();
      addErrorBar(data.message || '未知错误');
      if (activeTool) {
        setToolPhaseStatus(activeTool, 'err', '失败');
        activeTool = null;
      }
      if (pendingNode) { pendingNode.className = 't-node err'; pendingNode = null; }
      break;
  }
}

async function send(prompt) {
  busy = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  autoGrow();
  addUser(prompt);
  startTurn(prompt);
  addTyping();
  // 创建 AbortController，允许 deleteSession/switchSession/newSession 取消进行中 SSE 流
  const ac = new AbortController();
  currentAbort = ac;
  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, session_id: currentSessionId }),
      signal: ac.signal,
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      addErrorBar(err.error || ('HTTP ' + resp.status));
      return;
    }
    removeTyping();
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buffer.indexOf('\n\n')) >= 0) {
        const raw = buffer.slice(0, idx);
        buffer = buffer.slice(idx + 2);
        const { event, data } = parseSSE(raw);
        handleEvent(event, data);
      }
    }
  } catch (e) {
    // abort 导致的 AbortError 静默处理（删除/切换/新建已自行清理）
    if (e.name === 'AbortError') return;
    addErrorBar(String(e));
  } finally {
    // 正常结束或异常退出时清空 currentAbort（abort 触发时已在调用方清空）
    if (currentAbort === ac) currentAbort = null;
    finalizeBot();
    busy = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener('click', (e) => { e.preventDefault(); submit(); });
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
});
function submit() {
  const prompt = inputEl.value.trim();
  if (!prompt || busy) return;
  send(prompt);
}
document.querySelectorAll('.hint').forEach(h => {
  h.addEventListener('click', () => { if (busy) return; inputEl.value = h.dataset.prompt; submit(); });
});

clearBtn.addEventListener('click', () => {
  if (busy) return;
  // 取消进行中 SSE 流
  if (currentAbort) { currentAbort.abort(); currentAbort = null; }
  clearAll();
  currentSessionId = null;
  // 刷新列表高亮：currentSessionId=null 使无条目 active
  loadSessions();
  inputEl.focus();
});
newSessionBtn.addEventListener('click', newSession);

function autoGrow() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
}
inputEl.addEventListener('input', autoGrow);
inputEl.focus();
loadSessions();
</script>
